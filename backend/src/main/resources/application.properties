spring.application.name=LMS

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Port
server.port=${PORT:8080}

# Optimize Startup for Render
spring.jpa.open-in-view=true
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=WARN

# Groq AI Configuration (Fast & Free)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Twilio Configuration
twilio.account.sid=${TWILIO_SID:YOUR_TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_TOKEN:YOUR_TWILIO_AUTH_TOKEN}

twilio.whatsapp.from=whatsapp:+14155238886

# Email Configuration (SMTP)
spring.mail.host=smtp.googlemail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:vinayakavinni868@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wcmyeumypnenqlud}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.googlemail.com
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Security Debugging
logging.level.org.springframework.security=ERROR
spring.security.debug=false

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary - Cloud File Storage (set in Render environment variables)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}