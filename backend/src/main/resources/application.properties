spring.application.name=LMS

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Port
server.port=${PORT:8080}

# Optimize Startup for Render
spring.jpa.open-in-view=true
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=WARN

# Groq AI Configuration (Fast & Free)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Twilio Configuration
twilio.account.sid=${TWILIO_SID:YOUR_TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_TOKEN:YOUR_TWILIO_AUTH_TOKEN}

twilio.whatsapp.from=whatsapp:+14155238886

# Email Configuration (SMTP Redirect to Brevo API)
spring.mail.host=smtp.googlemail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:vinayakavinni868@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wcmyeumypnenqlud}
brevo.api.key=${BREVO_API_KEY}
spring.mail.properties.mail.smtp.auth=true

# Security Debugging
logging.level.org.springframework.security=ERROR
spring.security.debug=false

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ── File Storage ──────────────────────────────────────────────────────────────
# MODE 1: Google Drive (RECOMMENDED — set GOOGLE_DRIVE_* env vars)
# For local dev: set google.drive.credentials-path to your JSON file path
# For production (Render): set GOOGLE_DRIVE_CREDENTIALS_JSON to full JSON content
google.drive.credentials-json=${GOOGLE_DRIVE_CREDENTIALS_JSON:}
google.drive.credentials-path=${GOOGLE_DRIVE_CREDENTIALS_PATH:}
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# MODE 2: Cloudinary (set CLOUDINARY_* env vars on Render/cloud platforms)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# MODE 3: Local disk (fallback — leave all above vars empty)
file.upload.dir=${FILE_UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# DigiLocker OAuth 2.0 (set in Render environment variables after registering at DigiLocker API portal)
# Register at: https://partners.digitallocker.gov.in/ to get Client ID and Secret
digilocker.client-id=${DIGILOCKER_CLIENT_ID:}
digilocker.client-secret=${DIGILOCKER_CLIENT_SECRET:}
digilocker.redirect-uri=${DIGILOCKER_REDIRECT_URI:}

# Frontend base URL — used to redirect browser after DigiLocker callback
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}